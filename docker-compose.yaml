services:
  app:
    build: .
    container_name: app
    restart: always
    depends_on:
      - db
      - redis
      - nats
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=mydatabase
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mysql:latest
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydatabase
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    container_name: nats
    restart: always
    ports:
      - "4222:4222"

volumes:
  db_data:
